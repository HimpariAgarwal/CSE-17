<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unique Bootstrap Mini Project</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      transition: 0.3s;
    }

    .hero {
      padding: 80px 20px;
      text-align: center;
      border-radius: 15px;
      margin-top: 30px;
    }

    .card:hover {
      transform: scale(1.05);
      transition: 0.3s;
    }

    .dark-mode {
      background-color: #121212;
      color: white;
    }

    .dark-mode .card {
      background-color: #1f1f1f;
      color: white;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">My Unique UI</a>

    <button class="btn btn-warning" onclick="toggleMode()">🌙 Mode</button>
  </div>
</nav>

<!-- Hero -->
<div class="container hero bg-light">
  <h1 class="text-primary">Welcome to My Unique Bootstrap Page</h1>
  <p>HTML + CSS + JS Interactive UI</p>

  <button class="btn btn-success" onclick="increaseCount()">
    Click Me 👍
  </button>

  <h4 class="mt-3">Clicks: <span id="count">0</span></h4>
</div>

<!-- Cards -->
<div class="container mt-5">
  <div class="row g-3">

    <div class="col-md-4">
      <div class="card p-3 shadow">
        <h5>Fast UI</h5>
        <p>Bootstrap makes design super fast.</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 shadow">
        <h5>Responsive</h5>
        <p>Works on mobile, tablet, and desktop.</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 shadow">
        <h5>Interactive</h5>
        <p>JavaScript adds real functionality.</p>
      </div>
    </div>

  </div>
</div>

<script>
  let count = 0;

  function increaseCount() {
    count++;
    document.getElementById("count").innerText = count;
  }

  function toggleMode() {
    document.body.classList.toggle("dark-mode");
  }
</script>

</body>
</html>
